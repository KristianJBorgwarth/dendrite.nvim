name: CI

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Neovim and Lua tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim lua5.1 luarocks liblua5.1-dev

      - name: Install busted
        run: luarocks --lua-version=5.1 install busted

      - name: Run busted specs
        run: busted lua/spec

      - name: Verify Neovim loads the plugin
        run: nvim --headless --cmd "set rtp+=." "+lua require('dendrite').setup({})" +qa
