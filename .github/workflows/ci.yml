name: CI

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim lua5.1 lua-busted

      - name: Run tests
        run: |
          export LUA_PATH="./lua/?.lua;./lua/?/init.lua;;"
          busted spec

      - name: Verify Neovim loads plugin
        run: nvim --headless --cmd "set rtp+=." "+lua require('dendrite').setup({})" +qa
